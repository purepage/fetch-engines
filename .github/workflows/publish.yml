name: Build, Test, and Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_live_tests:
        description: "Run live network smoke tests"
        required: false
        type: boolean
        default: false
  # schedule:
  #   - cron: "0 3 * * *" # 03:00 UTC daily live smoke

# Prevent multiple concurrent workflow runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub releases and tags
      id-token: write # Optional: If using OIDC for authentication instead of token

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Format code
        run: pnpm format

      - name: Run Lint
        run: pnpm lint

      - name: Run Tests
        run: pnpm test

      - name: Run Live Network Smoke Tests (opt-in)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_live_tests == true)
        env:
          LIVE_NETWORK: "1"
        run: pnpm test:live

      - name: Build project
        run: pnpm build

      # --- Publish + Release (only on push to main, only if version is new) ---

      - name: Check if version is already published
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "version=${LOCAL_VERSION}" >> "$GITHUB_OUTPUT"

          PUBLISHED=$(npm view "${PACKAGE_NAME}@${LOCAL_VERSION}" version 2>/dev/null || echo "")
          if [ "${PUBLISHED}" = "${LOCAL_VERSION}" ]; then
            echo "new_version=false" >> "$GITHUB_OUTPUT"
            echo "Version ${LOCAL_VERSION} already published — skipping publish and release."
          else
            echo "new_version=true" >> "$GITHUB_OUTPUT"
            echo "Version ${LOCAL_VERSION} is new — will publish and release."
          fi

      - name: Setup Node.js for publish
        if: steps.version_check.outputs.new_version == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"

      - name: Publish to NPM
        if: steps.version_check.outputs.new_version == 'true'
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version_check.outputs.new_version == 'true'
        run: |
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)
          gh release create "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "v${VERSION}" \
            --notes "${NOTES}"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version_check.outputs.version }}
          GITHUB_SHA: ${{ github.sha }}
