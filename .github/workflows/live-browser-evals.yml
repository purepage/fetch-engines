name: Live Browser Evals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/live-browser-evals.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/eval-auto-render.mjs"
      - "src/**"
      - "test/live/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-auto-render:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build project
        run: pnpm build

      - name: Run live browser smoke tests
        run: pnpm test:live:smoke

      - name: Run live browser auto-render gate
        run: pnpm test:live:auto-render

      - name: Generate live eval report
        if: always()
        run: pnpm eval:auto-render > auto-render-report.json

      - name: Upload live eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-render-report
          path: auto-render-report.json
